<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt A Cat/Dog - Find a Dog/Cat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Adopt A Cat/Dog Logo" class="logo">
        <h1>Adopt A Cat/Dog</h1>
    </header>
    <div class="container">
        <nav class="side-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="browse.html">Browse Available Pets</a></li>
                <li><a href="find.html">Find a dog/cat</a></li>
                <li><a href="dog-care.html">Dog Care</a></li>
                <li><a href="cat-care.html">Cat Care</a></li>
                <li><a href="give-away.html">Have a pet to give away</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <main class="content-area">
            <h2>Find a Dog/Cat</h2>
            <form>
                <label for="animal">Cat or Dog:</label>
                <select id="animal" name="animal">
                    <option value="doesnt-matter">Doesn't Matter</option>
                    <option value="cat">Cat</option>
                    <option value="dog">Dog</option>
                </select><br><br>

                <label for="breed">Breed of Dog/Cat:</label>
                <input type="text" id="breed" name="breed"><br><br>

                <label for="age">Preferred Age of Animal:</label>
                <input type="text" id="age" name="age"><br><br>

                <label for="gender">Preferred Gender:</label>
                <select id="gender" name="gender">
                    <option value="doesnt-matter">Doesn't Matter</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select><br><br>

                <label for="get-along">Needs to Get Along with:</label>
                <input type="text" id="get-along" name="get-along"><br><br>

                <button type="submit">Submit</button>
                <button type="reset">Clear</button>
            </form>
        </main>
    </div>
    <footer>
        <p>Privacy/Disclaimer Statement</p>
    </footer>
</body>
</html>
